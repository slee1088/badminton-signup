<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Signups — Reset password</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23cddc39'/%3E%3Cpath d='M2.5,11 C9,17 9,17 15,17.5' stroke='white' stroke-width='1.6' fill='none' opacity='0.9'/%3E%3Cpath d='M29.5,21 C23,15 23,15 17,14.5' stroke='white' stroke-width='1.6' fill='none' opacity='0.9'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --court: #1b4d6b;
    --court-deep: #123549;
    --paper: #f4f6f0;
    --card: #ffffff;
    --line: #dde3dd;
    --ink: #17211d;
    --muted: #6f7d77;
    --accent: #cddc39;
    --err: #c4453c;
    --err-bg: #fbe9e7;
    --ok-bg: #e6efe9;
    --display: "Fraunces", Georgia, serif;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 100% 0%, rgba(31,77,71,0.05), transparent 45%),
      radial-gradient(circle at 0% 100%, rgba(242,167,51,0.06), transparent 40%);
    color: var(--ink);
    font-family: var(--sans);
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 28px;
  }
  .brand .mark { width: 30px; height: 30px; flex-shrink: 0; display: block; }
  .brand .mark svg { width: 100%; height: 100%; display: block; }
  .brand .name { font-family: var(--display); font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 36px 36px 32px;
    box-shadow: 0 1px 2px rgba(23,33,29,0.04), 0 12px 32px -16px rgba(23,33,29,0.12);
  }
  h1 { font-family: var(--display); font-size: 1.7rem; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
  p.sub { margin: 0 0 8px; color: var(--muted); font-size: 0.92rem; line-height: 1.5; }
  .court-rule { display: flex; align-items: center; gap: 4px; margin: 16px 0 22px; }
  .court-rule span { height: 1px; flex: 1; background: var(--line); }
  .court-rule::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 7px;
    margin-top: 4px;
  }
  input[type=password] {
    width: 100%;
    padding: 11px 13px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--card);
    box-shadow: 0 0 0 3px rgba(242,167,51,0.18);
  }
  button.primary {
    width: 100%;
    margin-top: 22px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--court);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button.primary:hover { background: var(--court-deep); }
  button.primary:active { transform: translateY(1px); }
  .msg { display: none; margin-top: 16px; padding: 11px 13px; border-radius: 8px; font-size: 0.85rem; line-height: 1.4; }
  .msg.error { background: var(--err-bg); color: var(--err); display: block; }
  .msg.ok { background: var(--ok-bg); color: var(--court-deep); display: block; }
  a.back {
    display: inline-block;
    margin-top: 20px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--court);
    text-decoration: none;
  }
  a.back:hover { color: var(--accent-deep, #c97f14); text-decoration: underline; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="mark"><svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="15" fill="var(--accent)"/><path d="M2.5,11 C9,17 9,17 15,17.5" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.9"/><path d="M29.5,21 C23,15 23,15 17,14.5" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.9"/></svg></span><span class="name">Tennis Signups</span></div>
    <h1>Set a new password</h1>
    <p class="sub" id="subtext">Loading your reset link…</p>
    <div class="court-rule"><span></span></div>
    <form id="resetForm" style="display:none;">
      <label for="newPw">New password</label>
      <input type="password" id="newPw" required minlength="8" autocomplete="new-password">
      <button class="primary" type="submit">Update password</button>
      <div class="msg" id="msg"></div>
    </form>
    <a class="back" href="index.html" id="backLink" style="display:none;">Back to sign in</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // Same values as index.html
    const SUPABASE_URL = "https://okqljdzviscpjujbedyu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_P7wolQLVaigElk3-NruNGg_vtp4pQNd";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id) => document.getElementById(id);

    // Supabase's reset link logs the user into a temporary "recovery"
    // session and fires this event — that's our cue to show the form.
    sb.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY") {
        $("subtext").textContent = "Choose a new password below.";
        $("resetForm").style.display = "block";
      }
    });

    // If the link already resolved before our listener attached.
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        $("subtext").textContent = "Choose a new password below.";
        $("resetForm").style.display = "block";
      } else {
        setTimeout(async () => {
          const { data: { session } } = await sb.auth.getSession();
          if (!session) {
            $("subtext").textContent = "This reset link is invalid or has expired.";
            $("backLink").style.display = "inline-block";
          }
        }, 1500);
      }
    })();

    $("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = $("newPw").value;
      const { error } = await sb.auth.updateUser({ password });
      const msgEl = $("msg");
      if (error) {
        msgEl.textContent = error.message;
        msgEl.className = "msg error";
      } else {
        msgEl.textContent = "Password updated. You can sign in now.";
        msgEl.className = "msg ok";
        $("resetForm").style.display = "none";
        $("backLink").style.display = "inline-block";
      }
    });
  </script>
</body>
</html>
