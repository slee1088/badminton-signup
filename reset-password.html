<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set new password</title>
<style>
  :root {
    --ink: #1c1f1d;
    --paper: #f6f4ef;
    --line: #d8d3c6;
    --accent: #3f6b4a;
    --err: #a13d3d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    color: var(--ink);
    font-family: system-ui, -apple-system, sans-serif;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 32px;
  }
  h1 { font-size: 1.3rem; margin: 0 0 4px; }
  p.sub { margin: 0 0 24px; color: #6b6f6c; font-size: 0.9rem; }
  label {
    display: block;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #6b6f6c;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input[type=password] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 0.95rem;
  }
  button.primary {
    width: 100%;
    margin-top: 24px;
    padding: 11px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  .msg { display: none; margin-top: 16px; padding: 10px 12px; border-radius: 6px; font-size: 0.85rem; }
  .msg.error { background: #f6e6e6; color: var(--err); display: block; }
  .msg.ok { background: #e8f0ea; color: var(--accent); display: block; }
  a.back { display: inline-block; margin-top: 18px; font-size: 0.85rem; color: var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <h1>Set a new password</h1>
    <p class="sub" id="subtext">Loading your reset link…</p>
    <form id="resetForm" style="display:none;">
      <label for="newPw">New password</label>
      <input type="password" id="newPw" required minlength="8" autocomplete="new-password">
      <button class="primary" type="submit">Update password</button>
      <div class="msg" id="msg"></div>
    </form>
    <a class="back" href="index.html" id="backLink" style="display:none;">Back to sign in</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // Same values as index.html
    const SUPABASE_URL = "https://YOUR-PROJECT-REF.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR-ANON-PUBLIC-KEY";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id) => document.getElementById(id);

    // Supabase's reset link logs the user into a temporary "recovery"
    // session and fires this event — that's our cue to show the form.
    supabase.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY") {
        $("subtext").textContent = "Choose a new password below.";
        $("resetForm").style.display = "block";
      }
    });

    // If the link already resolved before our listener attached.
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        $("subtext").textContent = "Choose a new password below.";
        $("resetForm").style.display = "block";
      } else {
        setTimeout(async () => {
          const { data: { session } } = await supabase.auth.getSession();
          if (!session) {
            $("subtext").textContent = "This reset link is invalid or has expired.";
            $("backLink").style.display = "inline-block";
          }
        }, 1500);
      }
    })();

    $("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = $("newPw").value;
      const { error } = await supabase.auth.updateUser({ password });
      const msgEl = $("msg");
      if (error) {
        msgEl.textContent = error.message;
        msgEl.className = "msg error";
      } else {
        msgEl.textContent = "Password updated. You can sign in now.";
        msgEl.className = "msg ok";
        $("resetForm").style.display = "none";
        $("backLink").style.display = "inline-block";
      }
    });
  </script>
</body>
</html>
