<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Signups</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23cddc39'/%3E%3Cpath d='M2.5,11 C9,17 9,17 15,17.5' stroke='white' stroke-width='1.6' fill='none' opacity='0.9'/%3E%3Cpath d='M29.5,21 C23,15 23,15 17,14.5' stroke='white' stroke-width='1.6' fill='none' opacity='0.9'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* ---- token system ---- */
    --court: #1b4d6b;         /* hard-court blue — primary */
    --court-deep: #123549;
    --paper: #f4f6f0;         /* cool, barely-tinted background (not cream) */
    --card: #ffffff;
    --line: #dde3dd;
    --ink: #17211d;
    --muted: #6f7d77;
    --accent: #cddc39;        /* tennis-ball chartreuse — used sparingly */
    --accent-deep: #9aa82a;
    --err: #c4453c;
    --err-bg: #fbe9e7;
    --ok-bg: #e6efe9;

    --display: "Fraunces", Georgia, serif;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
    --mono: "Space Mono", "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 100% 0%, rgba(31,77,71,0.05), transparent 45%),
      radial-gradient(circle at 0% 100%, rgba(242,167,51,0.06), transparent 40%);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- shared brand mark ---------- */
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 28px;
  }
  .brand .mark {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    display: block;
  }
  .brand .mark svg { width: 100%; height: 100%; display: block; }
  .brand .name {
    font-family: var(--display);
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  /* ---------- auth screens ---------- */
  .screen {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 36px 36px 32px;
    box-shadow: 0 1px 2px rgba(23,33,29,0.04), 0 12px 32px -16px rgba(23,33,29,0.12);
  }
  .card h1 {
    font-family: var(--display);
    font-size: 1.7rem;
    font-weight: 600;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .card p.sub {
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 0.92rem;
    line-height: 1.5;
  }
  /* service-line rule — the recurring "court" motif under headings */
  .court-rule {
    display: flex;
    align-items: center;
    gap: 4px;
    margin: 16px 0 22px;
  }
  .court-rule span { height: 1px; flex: 1; background: var(--line); }
  .court-rule::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 7px;
    margin-top: 18px;
  }
  input[type=email], input[type=password], input[type=text] {
    width: 100%;
    padding: 11px 13px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s;
  }
  input::placeholder { color: #a8b3ac; }
  input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--card);
    box-shadow: 0 0 0 3px rgba(242,167,51,0.18);
  }
  button.primary {
    width: 100%;
    margin-top: 26px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--court);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button.primary:hover { background: var(--court-deep); }
  button.primary:active { transform: translateY(1px); }
  button.link {
    background: none;
    border: none;
    color: var(--court);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
  }
  button.link:hover { color: var(--accent-deep); text-decoration: underline; }
  .row-links {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
  }
  .msg {
    display: none;
    margin-top: 16px;
    padding: 11px 13px;
    border-radius: 8px;
    font-size: 0.85rem;
    line-height: 1.4;
  }
  .msg.error { background: var(--err-bg); color: var(--err); display: block; }
  .msg.ok { background: var(--ok-bg); color: var(--court-deep); display: block; }

  /* ---------- table screen ---------- */
  #tableScreen { display: none; flex-direction: column; padding: 0; align-items: stretch; justify-content: flex-start; min-height: 100vh; }
  header.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    background: var(--court);
    color: #fff;
  }
  header.topbar .brand { margin-bottom: 0; }
  header.topbar .brand .name { color: #fff; }
  header.topbar .who {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: rgba(255,255,255,0.65);
    margin-top: 3px;
  }
  header.topbar .actions { display: flex; gap: 14px; align-items: center; }
  button.ghost {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 7px;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    color: #fff;
    transition: background 0.15s;
  }
  button.ghost:hover { background: rgba(255,255,255,0.18); }

  /* ghost button on light background (Add row) needs its own treatment */
  main.tablewrap button.ghost {
    background: var(--card);
    border: 1.5px solid var(--court);
    color: var(--court);
  }
  main.tablewrap button.ghost:hover { background: var(--court); color: #fff; }
  main.tablewrap button.ghost:disabled {
    background: var(--paper);
    border-color: var(--line);
    color: var(--muted);
    cursor: not-allowed;
  }

  main.tablewrap { padding: 32px; max-width: 1080px; margin: 0 auto; width: 100%; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
  }
  th, td { text-align: left; padding: 13px 14px; font-size: 0.92rem; }
  thead th {
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    background: var(--paper);
    border-bottom: 1.5px solid var(--line);
    font-weight: 700;
  }
  tbody tr { border-bottom: 1px solid var(--line); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(31,77,71,0.03); }

  /* signature element: scoreboard-style row-number chip */
  td.rownum {
    width: 40px;
  }
  td.rownum span {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    height: 20px;
    padding: 0 4px;
    border-radius: 4px;
    background: var(--court);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 700;
  }

  td.ts { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
  td input {
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    padding: 6px 8px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 0.9rem;
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s;
  }
  td input:hover { background: var(--paper); }
  td input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--card);
    box-shadow: 0 0 0 2px rgba(242,167,51,0.15);
  }
  .del-cell { width: 40px; text-align: center; }
  .del-btn {
    background: none;
    border: none;
    color: #b7c0ba;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 4px;
    border-radius: 5px;
    transition: color 0.15s, background 0.15s;
  }
  .del-btn:hover { color: var(--err); background: var(--err-bg); }

  #addRowBtn { margin-top: 18px; }
  #loadingMsg {
    padding: 60px 0;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  /* role badge — reuses the scoreboard-chip language */
  .who .role-chip {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 7px;
    border-radius: 4px;
    background: var(--accent);
    color: var(--court-deep);
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  .stamp {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 700;
  }
  .stamp.saving { color: rgba(255,255,255,0.65); }
  .stamp.error { color: #ff9d94; }
  .stamp.hidden { visibility: hidden; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  @media (max-width: 640px) {
    header.topbar { padding: 14px 18px; }
    main.tablewrap { padding: 18px; }
    th, td { padding: 10px 8px; font-size: 0.85rem; }
    .card { padding: 28px 22px; }
  }
</style>
</head>
<body>

<!-- ================= SIGN IN ================= -->
<section id="signInScreen" class="screen">
  <div class="card">
    <div class="brand"><span class="mark"><svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="15" fill="var(--accent)"/><path d="M2.5,11 C9,17 9,17 15,17.5" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.9"/><path d="M29.5,21 C23,15 23,15 17,14.5" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.9"/></svg></span><span class="name">Tennis Signups</span></div>
    <h1>Sign in</h1>
    <p class="sub">Welcome back. Let's see who's on court.</p>
    <div class="court-rule"><span></span></div>
    <form id="signInForm">
      <label for="siEmail">Email</label>
      <input type="email" id="siEmail" required autocomplete="email">
      <label for="siPassword">Password</label>
      <input type="password" id="siPassword" required autocomplete="current-password">
      <button class="primary" type="submit">Sign in</button>
      <div class="row-links">
        <button type="button" class="link" id="goSignUp">Create account</button>
        <button type="button" class="link" id="goForgot">Forgot password?</button>
      </div>
      <div class="msg" id="siError"></div>
    </form>
  </div>
</section>

<!-- ================= SIGN UP ================= -->
<section id="signUpScreen" class="screen">
  <div class="card">
    <div class="brand"><span class="mark"><svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="15" fill="var(--accent)"/><path d="M2.5,11 C9,17 9,17 15,17.5" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.9"/><path d="M29.5,21 C23,15 23,15 17,14.5" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.9"/></svg></span><span class="name">Tennis Signups</span></div>
    <h1>Create account</h1>
    <p class="sub">Pick a password and you're in.</p>
    <div class="court-rule"><span></span></div>
    <form id="signUpForm">
      <label for="suEmail">Email</label>
      <input type="email" id="suEmail" required autocomplete="email">
      <label for="suPassword">Password</label>
      <input type="password" id="suPassword" required minlength="8" autocomplete="new-password">
      <button class="primary" type="submit">Create account</button>
      <div class="row-links">
        <button type="button" class="link" id="backToSignIn1">Back to sign in</button>
        <span></span>
      </div>
      <div class="msg" id="suMsg"></div>
    </form>
  </div>
</section>

<!-- ================= FORGOT PASSWORD ================= -->
<section id="forgotScreen" class="screen">
  <div class="card">
    <div class="brand"><span class="mark"><svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="15" fill="var(--accent)"/><path d="M2.5,11 C9,17 9,17 15,17.5" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.9"/><path d="M29.5,21 C23,15 23,15 17,14.5" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.9"/></svg></span><span class="name">Tennis Signups</span></div>
    <h1>Reset password</h1>
    <p class="sub">Enter your email and we'll send a reset link.</p>
    <div class="court-rule"><span></span></div>
    <form id="forgotForm">
      <label for="fpEmail">Email</label>
      <input type="email" id="fpEmail" required autocomplete="email">
      <button class="primary" type="submit">Send reset link</button>
      <div class="row-links">
        <button type="button" class="link" id="backToSignIn2">Back to sign in</button>
        <span></span>
      </div>
      <div class="msg" id="fpMsg"></div>
    </form>
  </div>
</section>

<!-- ================= TABLE ================= -->
<section id="tableScreen" class="screen">
  <header class="topbar">
    <div>
      <div class="brand"><span class="mark"><svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="15" fill="var(--accent)"/><path d="M2.5,11 C9,17 9,17 15,17.5" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.9"/><path d="M29.5,21 C23,15 23,15 17,14.5" stroke="#fff" stroke-width="1.6" fill="none" opacity="0.9"/></svg></span><span class="name">Tennis Signups</span></div>
      <div class="who" id="whoAmI"></div>
    </div>
    <div class="actions">
      <span class="stamp hidden" id="stamp"></span>
      <button class="ghost" id="logoutBtn">Sign out</button>
    </div>
  </header>
  <main class="tablewrap">
    <div id="loadingMsg">Loading…</div>
    <table id="dataTable" style="display:none;">
      <thead>
        <tr>
          <th class="rownum">#</th>
          <th>Player</th>
          <th>Session</th>
          <th>Notes</th>
          <th>Signed up</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <button class="ghost" id="addRowBtn" style="display:none;">＋ Add row</button>
  </main>
</section>

<!-- Supabase client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ============================================================
// 1) Fill these in from Supabase Dashboard → Project Settings → API
// ============================================================
const SUPABASE_URL = "https://okqljdzviscpjujbedyu.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_P7wolQLVaigElk3-NruNGg_vtp4pQNd";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = (id) => document.getElementById(id);

function showScreen(id) {
  ["signInScreen", "signUpScreen", "forgotScreen", "tableScreen"].forEach(s => {
    $(s).style.display = (s === id) ? "flex" : "none";
  });
}
function showMsg(el, text, kind) {
  el.textContent = text;
  el.className = "msg " + kind;
}

// ---------- nav between auth screens ----------
$("goSignUp").addEventListener("click", () => showScreen("signUpScreen"));
$("goForgot").addEventListener("click", () => showScreen("forgotScreen"));
$("backToSignIn1").addEventListener("click", () => showScreen("signInScreen"));
$("backToSignIn2").addEventListener("click", () => showScreen("signInScreen"));

// ---------- sign up ----------
$("signUpForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = $("suEmail").value.trim();
  const password = $("suPassword").value;
  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: { emailRedirectTo: location.origin + location.pathname }
  });
  const msgEl = $("suMsg");
  if (error) {
    showMsg(msgEl, error.message, "error");
    return;
  }
  if (data.session) {
    // Email confirmation is off in Supabase, so signUp already returned
    // a live session — skip the "check your inbox" step entirely.
    $("signUpForm").reset();
    await afterLogin();
  } else {
    // Email confirmation is still on for this project — fall back to
    // the verify-by-email flow.
    showMsg(msgEl, "Check your inbox for a verification link, then sign in.", "ok");
    $("signUpForm").reset();
  }
});

// ---------- forgot password ----------
$("forgotForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = $("fpEmail").value.trim();
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + location.pathname.replace(/index\.html$/, "") + "reset-password.html"
  });
  const msgEl = $("fpMsg");
  if (error) {
    showMsg(msgEl, error.message, "error");
  } else {
    showMsg(msgEl, "If that email has an account, a reset link is on its way.", "ok");
  }
});

// ---------- sign in ----------
$("signInForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = $("siEmail").value.trim();
  const password = $("siPassword").value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg($("siError"), error.message, "error");
  } else {
    $("siError").style.display = "none";
    await afterLogin();
  }
});

// ---------- logout ----------
$("logoutBtn").addEventListener("click", async () => {
  await sb.auth.signOut();
  showScreen("signInScreen");
});

// ---------- session bootstrap ----------
let me = null;       // current auth user
let myRole = null;   // "standard" | "admin"

async function afterLogin() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { showScreen("signInScreen"); return; }
  me = user;

  const { data: profile, error } = await sb
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  myRole = (!error && profile) ? profile.role : "standard";
  $("whoAmI").innerHTML = `${user.email}<span class="role-chip">${myRole}</span>`;
  $("addRowBtn").textContent = myRole === "admin" ? "＋ Add row" : "＋ Sign me up";

  showScreen("tableScreen");
  loadData();
}

// ---------- data ----------
let rows = [];

async function loadData() {
  $("loadingMsg").style.display = "block";
  $("dataTable").style.display = "none";
  $("addRowBtn").style.display = "none";

  const { data, error } = await sb
    .from("ledger")
    .select("*")
    .order("created_at", { ascending: true });

  rows = error ? [] : data;
  render();
  updateAddButtonState();

  $("loadingMsg").style.display = "none";
  $("dataTable").style.display = "table";
  $("addRowBtn").style.display = "inline-block";
}

// Standard users get one signup only; admins can always add more rows.
function updateAddButtonState() {
  const btn = $("addRowBtn");
  if (myRole === "admin") {
    btn.disabled = false;
    btn.textContent = "＋ Add row";
    return;
  }
  const alreadySignedUp = rows.some(r => r.added_by === me.id);
  btn.disabled = alreadySignedUp;
  btn.textContent = alreadySignedUp ? "You're signed up" : "＋ Sign me up";
}

function escapeAttr(s) {
  return String(s ?? "").replace(/&/g, "&amp;").replace(/"/g, "&quot;");
}
function fmtTs(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  return d.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" });
}

function render() {
  const tbody = $("tbody");
  tbody.innerHTML = "";
  const isAdmin = myRole === "admin";

  rows.forEach((row, i) => {
    const tr = document.createElement("tr");
    if (isAdmin) {
      tr.innerHTML = `
        <td class="rownum"><span>${i + 1}</span></td>
        <td><input data-id="${row.id}" data-field="match" value="${escapeAttr(row.match)}"></td>
        <td><input data-id="${row.id}" data-field="score" value="${escapeAttr(row.score)}"></td>
        <td><input data-id="${row.id}" data-field="notes" value="${escapeAttr(row.notes)}"></td>
        <td class="ts">${fmtTs(row.created_at)}</td>
        <td class="del-cell"><button class="del-btn" data-id="${row.id}">✕</button></td>
      `;
    } else {
      // standard users: plain selectable text, no inputs to edit —
      // but they can remove their own row (and only their own).
      const isMine = row.added_by === me.id;
      tr.innerHTML = `
        <td class="rownum"><span>${i + 1}</span></td>
        <td>${escapeAttr(row.match)}</td>
        <td>${escapeAttr(row.score)}</td>
        <td>${escapeAttr(row.notes)}</td>
        <td class="ts">${fmtTs(row.created_at)}</td>
        <td class="del-cell">${isMine ? `<button class="del-btn" data-id="${row.id}">✕</button>` : ""}</td>
      `;
    }
    tbody.appendChild(tr);
  });

  if (isAdmin) {
    tbody.querySelectorAll("input").forEach(inp => {
      inp.addEventListener("change", async (e) => {
        const id = e.target.dataset.id;
        const field = e.target.dataset.field;
        showStamp("saving", "Saving…");
        const { error } = await sb
          .from("ledger")
          .update({ [field]: e.target.value })
          .eq("id", id);
        if (!error) {
          // Keep our in-memory copy in sync with what we just saved,
          // so a later render() (e.g. from clicking "Add row") doesn't
          // redraw this cell from stale data and wipe the edit.
          const row = rows.find(r => String(r.id) === String(id));
          if (row) row[field] = e.target.value;
        }
        showStamp(error ? "error" : "ok", error ? "Save failed" : "Saved");
      });
    });
  }

  // Delete buttons exist for admins (every row) and standard users (their
  // own row only) — same handler either way, since the database's RLS
  // policies enforce who's actually allowed to delete what.
  tbody.querySelectorAll(".del-btn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      const id = e.target.dataset.id;
      showStamp("saving", "Deleting…");
      const { error } = await sb.from("ledger").delete().eq("id", id);
      if (!error) rows = rows.filter(r => String(r.id) !== String(id));
      render();
      updateAddButtonState(); // a standard user who just removed themself can sign up again
      showStamp(error ? "error" : "ok", error ? "Delete failed" : "Deleted");
    });
  });
}

// "Add row" (admin) / "Sign me up" (standard, once only) — same button, different payload.
$("addRowBtn").addEventListener("click", async () => {
  if (myRole !== "admin" && rows.some(r => r.added_by === me.id)) return; // already signed up
  $("addRowBtn").disabled = true; // block a fast double-click while the insert is in flight

  showStamp("saving", "Adding…");
  const payload = myRole === "admin"
    ? { match: "", score: "", notes: "", added_by: me.id, added_by_email: me.email }
    : { match: me.email, score: "", notes: "", added_by: me.id, added_by_email: me.email };

  const { data, error } = await sb
    .from("ledger")
    .insert(payload)
    .select()
    .single();

  if (!error) {
    rows.push(data);
    render();
  }
  updateAddButtonState();
  showStamp(error ? "error" : "ok", error ? "Add failed" : "Added");
});

let stampTimer = null;
function showStamp(kind, text) {
  const el = $("stamp");
  el.textContent = text;
  el.classList.remove("hidden", "saving", "error");
  if (kind === "saving") el.classList.add("saving");
  if (kind === "error") el.classList.add("error");
  clearTimeout(stampTimer);
  if (kind !== "saving") {
    stampTimer = setTimeout(() => el.classList.add("hidden"), 1800);
  }
}

// ---------- boot ----------
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await afterLogin();
  } else {
    showScreen("signInScreen");
  }
})();

// Keep UI in sync if the session changes in another tab, or expires.
sb.auth.onAuthStateChange((event, session) => {
  if (event === "SIGNED_OUT") showScreen("signInScreen");
});
</script>
